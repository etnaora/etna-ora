name: Aggiorna comunicati INGV Etna

on:
  schedule:
    # Ogni 15 minuti, sfasato di 5 rispetto al workflow dei terremoti
    # (che scrive anch'esso su feed.json): evita che i due tentino di
    # fare commit sullo stesso file nello stesso momento.
    - cron: "5-59/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-comunicati:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Imposta Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Aggiorna data/feed.json (comunicati)
        run: python3 scripts/fetch_comunicati.py

      - name: Commit se ci sono cambiamenti
        run: |
          git config user.name "etna-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/feed.json
          git diff --cached --quiet || git commit -m "Aggiorna comunicati INGV [automatico]"
          git push
